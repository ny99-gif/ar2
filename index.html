<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seasonal AR Exhibition</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* お歯黒と同じ洗練されたUIデザイン */
      #ui-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 10000; display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        background: rgba(0,0,0,0.8); color: white; font-family: sans-serif;
      }
      #start-btn {
        padding: 15px 30px; background: #c5a059; border: none; color: white;
        font-size: 18px; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <div id="ui-overlay">
      <p>展示：四季の移ろい</p>
      <button id="start-btn">鑑賞を開始する</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./seasonal_targets.mind; autoStart: false;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="spring" src="./spring.glb"></a-asset-item>
        <a-asset-item id="summer" src="./summer.glb"></a-asset-item>
        <a-asset-item id="autumn" src="./autumn.glb"></a-asset-item>
        <a-asset-item id="winter" src="./winter.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#spring" position="0.5 -2 1" scale="0.5 0.5 0.5"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model src="#summer" position="0.5 -2 1" scale="0.5 0.5 0.5"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-gltf-model src="#autumn" position="0.5 -2 1" scale="0.5 0.5 0.5"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3">
        <a-gltf-model src="#winter" position="0.5 -2 1" scale="0.5 0.5 0.5"></a-gltf-model>
      </a-entity>

    </a-scene>

    <script>
      const overlay = document.getElementById('ui-overlay');
      const btn = document.getElementById('start-btn');
      const scene = document.querySelector('a-scene');

      // ボタンを押した瞬間にカメラとARシステムを起動
      btn.addEventListener('click', () => {
        scene.systems['mindar-image-system'].start();
        overlay.style.display = 'none';
      });
    </script>
  </body>
</html>
