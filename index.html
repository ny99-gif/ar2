<a-scene 
  mindar-image="imageTargetSrc: ./seasonal_targets.mind; autoStart: false; filterMinCF: 0.0001; filterBeta: 0.001;" 
  vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
  
  <a-assets>
    <a-asset-item id="spring" src="./spring.glb"></a-asset-item>
    <a-asset-item id="summer" src="./summer.glb"></a-asset-item>
    <a-asset-item id="autumn" src="./autumn.glb"></a-asset-item>
    <a-asset-item id="winter" src="./winter.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model src="#spring" position="0.5 -1 1" scale="0.01 0.01 0.01"
      animation="property: scale; from: 0.01 0.01 0.01; to: 0.4 0.4 0.4; dur: 1000; delay: 300; easing: easeOutCubic; startEvents: targetFound">
    </a-gltf-model>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 1">
    <a-gltf-model src="#summer" position="0.5 -1 1.2" scale="0.01 0.01 0.01"
      animation="property: scale; from: 0.01 0.01 0.01; to: 0.6 0.6 0.6; dur: 1000; delay: 300; easing: easeOutCubic; startEvents: targetFound">
    </a-gltf-model>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 2">
    <a-gltf-model src="#autumn" position="0.5 -1.4 1.2" scale="0.01 0.01 0.01"
      animation="property: scale; from: 0.01 0.01 0.01; to: 0.7 0.7 0.7; dur: 1000; delay: 300; easing: easeOutCubic; startEvents: targetFound">
    </a-gltf-model>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 3">
    <a-gltf-model src="#winter" position="0.5 -1.5 1" scale="0.01 0.01 0.01"
      animation="property: scale; from: 0.01 0.01 0.01; to: 0.75 0.75 0.75; dur: 1000; delay: 300; easing: easeOutCubic; startEvents: targetFound">
    </a-gltf-model>
  </a-entity>

</a-scene>
