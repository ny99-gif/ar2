<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./seasonal_targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="spring" src="./spring.glb"></a-asset-item>
        <a-asset-item id="summer" src="./summer.glb"></a-asset-item>
        <a-asset-item id="autumn" src="./autumn.glb"></a-asset-item>
        <a-asset-item id="winter" src="./winter.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#spring" rotation="0 0 0" position="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model src="#summer" rotation="0 0 0" position="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-gltf-model src="#autumn" rotation="0 0 0" position="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3">
        <a-gltf-model src="#winter" rotation="0 0 0" position="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
