<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seasonal AR Exhibition</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      #ui-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 10000; display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        background: #211E55; color: white; font-family: sans-serif;
      }
      #start-btn {
        padding: 15px 30px; background: #c5a059; border: none; color: white;
        font-size: 18px; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <div id="ui-overlay">
      <p>展示：四季の移ろい</p>
      <button id="start-btn">鑑賞を開始する</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./seasonal_targets.mind; autoStart: false; filterMinCF: 0.0001; filterBeta: 0.001;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="spring" src="./spring.glb"></a-asset-item>
        <a-asset-item id="summer" src="./summer.glb"></a-asset-item>
        <a-asset-item id="autumn" src="./autumn.glb"></a-asset-item>
        <a-asset-item id="winter" src="./winter.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" class="seasonal-target">
        <a-gltf-model src="#spring" position="0.5 -1 1" scale="0.01 0.01 0.01" 
          animation="property: scale; to: 0.4 0.4 0.4; dur: 800; easing: easeOutElastic; begin: start-animation">
        </a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1" class="seasonal-target">
        <a-gltf-model src="#summer" position="0.5 -1 1.2" scale="0.01 0.01 0.01" 
          animation="property: scale; to: 0.6 0.6 0.6; dur: 800; easing: easeOutElastic; begin: start-animation">
        </a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2" class="seasonal-target">
        <a-gltf-model src="#autumn" position="0.5 -1.4 1.2" scale="0.01 0.01 0.01" 
          animation="property: scale; to: 0.7 0.7 0.7; dur: 800; easing: easeOutElastic; begin: start-animation">
        </a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3" class="seasonal-target">
        <a-gltf-model src="#winter" position="0.5 -1.5 1" scale="0.01 0.01 0.01" 
          animation="property: scale; to: 0.75 0.75 0.75; dur: 800; easing: easeOutElastic; begin: start-animation">
        </a-gltf-model>
      </a-entity>

    </a-scene>

    <script>
      const overlay = document.getElementById('ui-overlay');
      const btn = document.getElementById('start-btn');
      const scene = document.querySelector('a-scene');

      btn.addEventListener('click', () => {
        scene.systems['mindar-image-system'].start();
        overlay.style.display = 'none';
      });

      // 【追加：アニメーションの合図を送るプログラム】
      // マーカーを見つけた瞬間に、中にあるモデルへ「開始して！」と伝えます
      const targets = document.querySelectorAll('.seasonal-target');
      targets.forEach((target) => {
        target.addEventListener("targetFound", event => {
          const model = target.querySelector('a-gltf-model');
          if (model) {
            // アニメーションをリセットして開始
            model.setAttribute('scale', '0.01 0.01 0.01');
            model.emit('start-animation');
          }
        });
      });
    </script>
  </body>
</html>
